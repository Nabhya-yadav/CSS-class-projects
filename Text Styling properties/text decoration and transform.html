<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            text-decoration: overline;
        }
        h2{
            text-decoration: underline;
        }
        h3{
            text-decoration: line-through;
        }
        .para1{
            text-transform: lowercase;
        }
        .para2{
            text-transform: uppercase;
        }
        .para3{
            text-transform: capitalize;
        }
    </style>
</head>
<body>
    <h1>overline</h1>
    <h2>underline</h2>
    <h3>line-through</h3>
    <p class="para1"> 
        IN UPPERCASE TEXT
    </p>
    <p class="para2"> this is in lowercase</p>
    <p class="para3">lowercase is uppercase</p>


</body>
</html>
