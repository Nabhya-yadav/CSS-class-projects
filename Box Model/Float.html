<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float</title>
    <style>
        img#floatright{
            float: right;
        }
        img#floatleft{
            float: left;
        }
    </style>
</head>
<body>
    <h1>Float</h1>
    <p>
        <img id="floatright" src="Screenshot 2026-05-01 122430.png" style="width: 50px; height: 50px;">
       
        <img id="floatleft" src="Screenshot 2026-05-01 122430.png" style="width: 50px; height: 50px;">
        In this example, the image will float to the right in the paragraph, and the text in the paragraph will wrap around the
        
        image.
    </p>
    
    
</body>
</html>
