<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gradient</title>
    <style>
        #grad1{

            background:linear-gradient(blue,red);
            height: 200px;
        }
        #grad2{
            background:radial-gradient(rgb(203, 34, 62),yellow);
            height: 200px;
        }
    </style>
</head>
<body>
    <div id="grad1"></div>
    <div id="grad2"></div>
    
</body>
</html>
