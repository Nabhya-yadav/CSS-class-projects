<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasty Bites</title>
    <style>
        body{
            background-color: beige;
        }
        div.static{
            position: static;
            background-color: rgb(196, 123, 33);
            border:3px solid black;
            padding: 10px;
            width: 100px;
        }
        div.absolute{
            position: absolute;
            background-color: rgb(33, 196, 87);
            border:3px solid black;
            padding: 10px;
            width: 100px;
        }
        div.relative{
            position: relative;
            background-color: rgb(33, 55, 196);
            border:3px solid black;
            padding: 10px;
            width: 100px;
            left: 200px;
        }
    </style>
</head>
<body>
    <h1>Tasty Bites Menu</h1>
    <h4>Static Element</h4>
    <div class="static">Static Element</div>
    <h4>absolute and relative element</h4>
    <div class="absolute"> absolute element</div>
    <div class="relative"> realtive element</div>
    
    
</body>
</html>
